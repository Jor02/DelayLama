name: Unit Tests

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate placeholder bitmap assets
        run: python extract_assets.py --placeholder --output assets

      - name: Configure CMake
        run: cmake --preset vs2022 

      - name: Build
        run: cmake --build --preset vs2022 --target DelayLamaTests

      - name: Run tests
        run: ctest --test-dir build/vs2022 --output-on-failure

      - name: Upload Test Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs
          path: build/vs2022/Testing/Temporary/LastTest.log